version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: opme_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: opme_db
      POSTGRES_USER: opme_user
      POSTGRES_PASSWORD: opme_pass_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opme_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://opme_user:opme_pass_2024@postgres:5432/opme_db
      JWT_SECRET: opme-jwt-secret-nos-2024-muito-seguro
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opme_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
  uploads_data:
